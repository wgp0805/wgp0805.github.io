              <figure class="highlight clean"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br><span class="line">73</span><br><span class="line">74</span><br><span class="line">75</span><br><span class="line">76</span><br><span class="line">77</span><br><span class="line">78</span><br><span class="line">79</span><br><span class="line">80</span><br><span class="line">81</span><br><span class="line">82</span><br><span class="line">83</span><br><span class="line">84</span><br><span class="line">85</span><br><span class="line">86</span><br><span class="line">87</span><br><span class="line">88</span><br><span class="line">89</span><br><span class="line">90</span><br><span class="line">91</span><br><span class="line">92</span><br><span class="line">93</span><br><span class="line">94</span><br><span class="line">95</span><br><span class="line">96</span><br><span class="line">97</span><br><span class="line">98</span><br><span class="line">99</span><br><span class="line">100</span><br><span class="line">101</span><br><span class="line">102</span><br><span class="line">103</span><br><span class="line">104</span><br><span class="line">105</span><br><span class="line">106</span><br><span class="line">107</span><br><span class="line">108</span><br><span class="line">109</span><br><span class="line">110</span><br><span class="line">111</span><br></pre></td><td class="code"><pre><code class="hljs clean"># 这个参数会启动JVM的<span class="hljs-string">&quot;server&quot;</span>模式，这种模式下JVM会进行更多的优化，但是启动速度会稍慢一些。<br>-server<br>## 设置JVM堆的初始大小				-Xms 和 -Xmx：-Xms 参数设置 JVM 初始堆大小，-Xmx 参数设置最大堆大小。一般推荐将这两个参数设置为相同的值，以避免 JVM 频繁调整堆大小，这样可以提高性能。<br>-Xms8192m<br>## 设置JVM堆的最大大小<br>-Xmx8192m<br>## 设置年轻代大小 					一般推荐将 -Xmn 设置为堆大小（由 -Xmx 或 -Xms 设置）的 <span class="hljs-number">1</span>/<span class="hljs-number">3</span> 到 <span class="hljs-number">1</span>/<span class="hljs-number">4</span>。这样可以保证足够的空间进行对象分配，同时也有足够的空间进行老年代的垃圾收集。<br>-Xmn2048m<br>## 设置新生代最小空间大小。<br>-XX:NewSize=<span class="hljs-number">2048</span>m<br>## 设置新生代最大空间大小。         -XX:NewSize 和 -XX:MaxNewSize 一般推荐将这两个参数设置为相同的值，并且与 -Xmn 的值相同。<br>-XX:MaxNewSize=<span class="hljs-number">2048</span>m<br>## 用于设置元空间的初始大小。		如果未指定此参数，元空间将根据运行时的应用需求动态地调整大小。<br>-XX:MetaspaceSize=<span class="hljs-number">1024</span>m<br>## 用于设置元空间的最大大小。即以前的永久代  如果你的应用有大量的类或者使用了大量的反射，你可能需要增加这个值。<br>-XX:MaxMetaspaceSize=<span class="hljs-number">1024</span>m<br>## 设置代码缓存的初始大小                    用来存储已编译方法生成的本地代码<br>-XX:InitialCodeCacheSize=<span class="hljs-number">512</span>m<br>## 设置代码缓存的最大大小                    注意： 过大的编译缓存，有可能导致，本地的编译代码，不是 ”实时的“ 导致引用错误，需要 idea invalidate caches<br>-XX:ReservedCodeCacheSize=<span class="hljs-number">1024</span>m<br><br>## 启用并发标记清除（CMS）垃圾收集器。 是 HotSpot 虚拟机第一款真正意义上的并发收集器，它第一次实现了让垃圾收集线程与用户线程（基本上）同时工作<br>## CMS（并发标记清除）垃圾收集器的 JVM 参数。CMS 是一个以获取最小垃圾收集停顿时间为目标的收集器，适用于对响应时间有严格要求的系统。<br>## 但是，CMS 有一些缺点，例如无法处理浮动垃圾，可能导致内存碎片化，以及在并发阶段可能会与应用线程竞争 CPU 资源。<br>## -XX:+UseConcMarkSweepGC<br>## CMS垃圾收集器，设置CMS垃圾收集器在堆内存使用率达到<span class="hljs-number">70</span>%时开始垃圾收集    当老年代达到<span class="hljs-number">62</span>%时，触发CMS垃圾回收<br>## -XX:CMSInitiatingOccupancyFraction=<span class="hljs-number">70</span><br>## 与CMSInitiatingOccupancyFraction配合使用，只在堆内存使用率达到CMSInitiatingOccupancyFraction设置的值时开始CMS垃圾收集。   只使用设定的阈值进行回收，如果不指定后续JVM会自动调整<br>## -XX:+UseCMSInitiatingOccupancyOnly<br><br>## 高性能，高并发和大内存，推荐使用以下垃圾收集器垃圾收集器：<br>## -XX:+UseG1GC                                    G1垃圾收集器（G1 GC）：G1 GC 是一个面向服务器的垃圾收集器，适用于多核处理器和大内存的系统。它可以处理大量的堆内存，并且可以预测垃圾收集的停顿时间。<br>## -XX:+UnlockExperimentalVMOptions -XX:+UseZGC    Z垃圾收集器（ZGC）：ZGC 是一个可扩展的低延迟垃圾收集器。ZGC 可以处理大量的堆内存，同时保持低延迟。但是，ZGC 在 JDK <span class="hljs-number">11</span> 中仍然是实验性的。<br>## -XX:+UseParallelGC                              并行垃圾收集器（Parallel GC）：Parallel GC 是一个多线程的垃圾收集器，适用于多核处理器的系统。它在吞吐量上表现优秀，但可能会导致较长的垃圾收集停顿。<br><br>## 使用G1垃圾收集器，它在处理大内存时表现更好。<br>-XX:+UseG1GC<br>## 这些是G1垃圾收集器的参数，用于控制垃圾收集的行为。<br>## 用于设置 G1 垃圾收集器的堆区域大小。      G1 垃圾收集器将堆内存分割成多个相同大小的区域，每个区域都可以是 Eden、Survivor 或 Old 区域。-XX:G1HeapRegionSize 参数用于设置这些区域的大小。<br>## 这个参数的值可以是 <span class="hljs-number">1</span>MB、<span class="hljs-number">2</span>MB、<span class="hljs-number">4</span>MB、<span class="hljs-number">8</span>MB、<span class="hljs-number">16</span>MB 或 <span class="hljs-number">32</span>MB。默认值由 JVM 根据你的硬件配置自动选择。<br>## 请注意，这个参数的设置可能会影响到 G1 垃圾收集器的性能。如果区域太大，可能会导致垃圾收集的效率降低；如果区域太小，可能会导致堆内存的利用率降低。<br>-XX:G1HeapRegionSize=<span class="hljs-number">32</span>M<br>## 用于设置垃圾收集器的目标停顿时间。单位是毫秒。主要目的是控制垃圾收集器的停顿时间，以减少应用程序的停顿时间。垃圾收集器会尽力保证停顿时间不超过设置的值，但这并不是一个硬性的限制，实际的停顿时间可能会超过这个值。<br>## =<span class="hljs-number">200</span>，那么垃圾收集器会尽力保证每次垃圾收集的停顿时间不超过<span class="hljs-number">200</span>毫秒。这个参数对于需要控制垃圾收集停顿时间的应用程序非常有用，例如实时系统或者具有严格响应时间要求的系统。<br>-XX:MaxGCPauseMillis=<span class="hljs-number">200</span><br>## 用于设置 G1 垃圾收集器在进行并行阶段（如初始标记和全局并行清除阶段）时的线程数。<br>-XX:ParallelGCThreads=<span class="hljs-number">12</span><br>## 用于设置 G1 垃圾收集器在进行并发阶段（如并发标记和并发清除阶段）时的线程数。<br>-XX:ConcGCThreads=<span class="hljs-number">12</span><br>## 编译器线程的总数 设置并行编译线程的数量，在使用分层编译时，JVM会自动分配这些线程给C1和C2编译器。<br>-XX:CICompilerCount=<span class="hljs-number">12</span><br>## 控制最大数量嵌套调用内联  默认值为<span class="hljs-number">9</span>，控制最大数量嵌套调用内联。 内联越多也将导致生成的机器码越长,越容易填满 ReservedCodeCacheSize , C2 不支持内联超过 <span class="hljs-number">9</span> 层的调用<br>## 增加了方法内联的最大深度，以提高性能。<br>-XX:MaxInlineLevel=<span class="hljs-number">15</span><br><br>## 这个参数设置了软引用对象的清理策略。每MB的空闲堆内存会保留<span class="hljs-number">50</span>ms的软引用对象。  默认值是<span class="hljs-number">1000</span><br>## 这个参数只在使用并行垃圾收集器（-XX:+UseParallelGC）或者串行垃圾收集器（-XX:+UseSerialGC）的情况下有效。<br>## 如果这个值设置得过大，可能会导致软引用对象占用过多的内存，从而增加垃圾收集的压力，降低性能。反之，如果这个值设置得过小，可能会导致软引用对象过早被回收，从而增加对象创建和初始化的开销，也可能降低性能。<br>-XX:SoftRefLRUPolicyMSPerMB=<span class="hljs-number">500</span><br><br>## 开启分层编译<br>-XX:+TieredCompilation<br>## Java8默认开启了「分层编译」<br>## 在开发环境中，为了加快应用启动速度，可以设置 -XX:TieredStopAtLevel=<span class="hljs-number">1</span>。在生产环境中，为了获取最高的运行性能，通常不应设置这个参数，让JVM使用所有可用的优化级别。<br>## 请注意，这个参数只在开启了分层编译（-XX:+TieredCompilation）的情况下有效。<br>### 参数的值从<span class="hljs-number">0</span>到<span class="hljs-number">4</span>，每个值的含义如下：<br>## - <span class="hljs-number">0</span>：解释执行，不进行任何编译优化。<br>## - <span class="hljs-number">1</span>：使用C1编译器进行简单优化。<br>## - <span class="hljs-number">2</span>：使用C1编译器进行有限的优化。<br>## - <span class="hljs-number">3</span>：使用C1编译器进行全优化。<br>## - <span class="hljs-number">4</span>：使用C2编译器进行全优化。      让 JVM 在启动时尽可能将所有代码编译为最高的 C4 级别（也就是 C2 编译器的编译级别），以提高程序运行时的效率。可能会增加 JVM 启动时的编译开销，因此可能会导致程序启动时间变长。<br>##<br>## 从启动速度和执行效率的角度对比排序如下：<br>##<br>## - 启动速度：<span class="hljs-number">0</span> &gt; <span class="hljs-number">1</span> &gt; <span class="hljs-number">2</span> &gt; <span class="hljs-number">3</span> &gt; <span class="hljs-number">4</span>     级别越高，启动时，越消耗 cpu，启动时间越长<br>## - 执行效率：<span class="hljs-number">4</span> &gt; <span class="hljs-number">3</span> &gt; <span class="hljs-number">2</span> &gt; <span class="hljs-number">1</span> &gt; <span class="hljs-number">0</span>     级别越高，运行时，效率越高<br>## 用于设置Java的多层编译系统的最高优化级别。<br>-XX:TieredStopAtLevel=<span class="hljs-number">4</span><br><br>## 即时编译 C4 第<span class="hljs-number">4</span>层（最高级）  ## 如果你的应用有一些热点方法，这些方法在应用启动后很快就会被频繁调用，那么可以考虑降低这些值，让这些方法更早地被编译到最高优化级别。<br>## 用于设置方法被调用多少次后才会被编译到第<span class="hljs-number">4</span>级别。   =<span class="hljs-number">10000</span>（默认） 表示一个方法被调用<span class="hljs-number">10000</span>次后，JVM会尝试将其编译到第<span class="hljs-number">4</span>级别。<br>-XX:Tier4MinInvocationThreshold=<span class="hljs-number">100</span><br>## 设置方法被解释执行多少次后才会被编译到第<span class="hljs-number">4</span>级别。    =<span class="hljs-number">2000</span>（默认） 表示一个方法被解释执行<span class="hljs-number">2000</span>次后，JVM会尝试将其编译到第<span class="hljs-number">4</span>级别。<br>-XX:Tier4InvocationThreshold=<span class="hljs-number">100</span><br>## 设置方法被编译执行多少次后才会被编译到第<span class="hljs-number">4</span>级别。    =<span class="hljs-number">15000</span>（默认） 表示一个方法被编译执行<span class="hljs-number">15000</span>次后，JVM会尝试将其编译到第<span class="hljs-number">4</span>级别。<br>-XX:Tier4CompileThreshold=<span class="hljs-number">100</span><br><br>## 这个参数让JVM在出现内存溢出错误时生成堆转储文件。<br>-XX:+HeapDumpOnOutOfMemoryError<br>## 这个参数禁止了快速抛出异常时省略堆栈跟踪，可以帮助调试。<br>-XX:-OmitStackTraceInFastThrow<br>## 这个参数启用了Java断言功能。<br>-ea<br>## 这个参数禁用了规范化路径缓存，可以避免在某些情况下出现文件锁定问题。<br>-Dsun.io.useCanonPrefixCache=false<br>## 这个参数让JVM优先使用IPv4网络栈。<br>-Djava.net.preferIPv4Stack=true<br>## 这个参数用于设置JDK HTTP认证中禁用的隧道协议。设置为空字符串<span class="hljs-string">&quot;&quot;</span>表示没有禁用任何协议。<br>-Djdk.http.auth.tunneling.disabledSchemes=<span class="hljs-string">&quot;&quot;</span><br>## 这个参数允许JVM自我附加。这通常用于某些类型的监控和管理操作。<br>-Djdk.attach.allowAttachSelf=true<br>## 这个参数用于控制Kotlin协程的调试模式。设置为<span class="hljs-string">&quot;off&quot;</span>表示关闭调试模式。<br>-Dkotlinx.coroutines.debug=off<br>## 用于控制Java <span class="hljs-number">9</span>及以上版本中的模块系统对非法访问的处理。在Java <span class="hljs-number">9</span>中，引入了模块系统，它对类的可见性进行了更严格的控制。默认情况下，如果一个类试图访问它不应该访问的另一个模块中的类，JVM会在控制台输出一个警告。<br>## 设置为 true JVM将不会输出这些警告。这可以使控制台输出更加清晰，但是可能会隐藏一些潜在的问题。<br>-Djdk.<span class="hljs-keyword">module</span>.illegalAccess.silent=true<br><br>-XX:+IgnoreUnrecognizedVMOptions<br>-Dsun.io.useCanonCaches=false<br>-XX:ErrorFile=$USER_HOME/java_error_in_idea_%p.log<br>-XX:HeapDumpPath=$USER_HOME/java_error_in_idea.hprof<br></code></pre></td></tr></table></figure>

  (function() {
    var enableLang = CONFIG.code_language.enable && CONFIG.code_language.default;

    }

    copyTmpl += '<div class="code-widget">';
    copyTmpl += 'LANG';

    jQuery('.markdown-body pre').each(function() {

      if ($pre.find('code.mermaid').length > 0) {
        return;
      }
      if ($pre.find('span.line').length > 0) {
        return;
      }

      var lang = '';

      if (enableLang) {
        lang = CONFIG.code_language.default;
        if ($pre[0].children.length > 0 && $pre[0].children[0].classList.length >= 2 && $pre.children().hasClass('hljs')) {
          lang = $pre[0].children[0].classList[1];
        } else if ($pre[0].getAttribute('data-language')) {
          lang = $pre[0].getAttribute('data-language');
        } else if ($pre.parent().hasClass('sourceCode') && $pre[0].children.length > 0 && $pre[0].children[0].classList.length >= 2) {
          lang = $pre[0].children[0].classList[1];
          $pre.parent().addClass('code-wrapper');
        } else if ($pre.parent().hasClass('markdown-body') && $pre[0].classList.length === 0) {
          $pre.wrap('<div class="code-wrapper"></div>');
        }
        lang = lang.toUpperCase().replace('NONE', CONFIG.code_language.default);
      }
      $pre.append(copyTmpl.replace('LANG', lang).replace('code-widget">',
        getBgClass($pre[0]) + (enableCopy ? ' code-widget copy-btn" data-clipboard-snippet><i class="iconfont icon-copy"></i>' : ' code-widget">')));

      if (enableCopy) {
        Fluid.utils.createScript('https://lib.baomitu.com/clipboard.js/2.0.10/clipboard.min.js', function() {
          var clipboard = new window.ClipboardJS('.copy-btn', {
            target: function(trigger) {
              var nodes = trigger.parentNode.childNodes;
              for (var i = 0; i < nodes.length; i++) {
                if (nodes[i].tagName === 'CODE') {
                  return nodes[i];
                }
              }
            }
          });
          clipboard.on('success', function(e) {
            e.clearSelection();
            e.trigger.innerHTML = e.trigger.innerHTML.replace('icon-copy', 'icon-success');
            setTimeout(function() {
              e.trigger.innerHTML = e.trigger.innerHTML.replace('icon-success', 'icon-copy');
            }, 2000);
          });
        });
      }
    });
  })();
</script>

      visible  : CONFIG.anchorjs.visible
    };
    if (CONFIG.anchorjs.icon) {

    }
    var el = (CONFIG.anchorjs.element || 'h1,h2,h3,h4,h5,h6').split(',');
    var res = [];
    for (var item of el) {
      res.push('.markdown-body > ' + item.trim());
    }
    if (CONFIG.anchorjs.placement === 'left') {
      window.anchors.options.class = 'anchorjs-link-left';
    }
    window.anchors.add(res.join(', '));
  });
</script>
